---
- name: Create application config directory
  file:
    path: /etc/example-app
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy application secret config
  template:
    src: config.env.j2
    dest: /etc/example-app/config.env
    owner: root
    group: root
    mode: "0600"
